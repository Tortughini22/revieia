function updateCourseText(val){
  S.courseText=val;
  // Mettre à jour le compteur sans re-render complet (évite de perdre le focus)
  const counter=document.getElementById('ct-counter');
  const btn=document.getElementById('gen-btn');
  const hint=document.getElementById('gen-hint');
  if(counter){
    const concepts=NLP.extractConcepts(val,5).length;
    const defs=NLP.extractDefinitions(val).length;
    const r=val.trim().length>50?ConfidenceAnalyzer.analyze(val,S.numQ):null;
    const col=r?(r.score>=75?'var(--c3)':r.score>=45?'var(--c4)':'var(--c5)'):'var(--txt3)';
    counter.innerHTML=`<span style="color:var(--txt3)">${val.length} car. · ${concepts} concepts · ${defs} définitions</span>${r?`<span style="color:${col};font-weight:700">Confiance : ${r.score}%</span>`:'<span style="color:var(--txt3)">Min. 50 car.</span>'}`;

}

function genQuiz(){
  const report=ConfidenceAnalyzer.analyze(S.courseText,S.numQ);
  S.confidenceReport=report;
  if(report.level==='low'&&!S.forceGen){S.page='confidence_warning';render();return;}
  S.forceGen=false;
  document.getElementById('app').innerHTML=renderHdr()+`<div class="loading"><div class="spin"></div><h3>L'IA analyse ton cours…</h3><p>Confiance : ${report.score}% · ${report.metrics.defs} définition(s) · ${report.metrics.concepts} concepts<br>Génération des questions en cours…</p></div>`+renderNav();
  setTimeout(()=>{
    try{
      const quiz=QuizEngine.generate(S.courseText,{type:S.quizType,numQ:S.numQ});
      if(!quiz||quiz.questions.length===0){toast('⚠️ Contenu insuffisant. Ajoute plus de texte ou enrichis l\'entraînement.');S.page='create';render();return;}
      S.quiz=quiz;
      S.quiz._confidence=report;
      S.corrections=[];S.currentQ=0;S.currentAns='';S.score=null;
      S.page='quiz';
      preloadQuizImages(quiz).then(()=>{if(S.page==='quiz')render();});
      render();
    }catch(e){console.error(e);toast('❌ Erreur de génération.');S.page='create';render();}
  },700);
}

function showResults(){
  const correct=S.corrections.filter(c=>c?.correct).length;
  const total=S.quiz.questions.length;
  const pct=Math.round((correct/total)*100);
  S.score={correct,total,pct};
  const wrongQs=S.quiz.questions.filter((_,i)=>!S.corrections[i]?.correct);
  const conf=S.quiz._confidence;
  S.advice=generateAdvice(S.score,wrongQs,S.quiz.subject,conf);
  updateMastery(S.quiz.subject,pct);
  const entry={id:Date.now(),subject:S.quiz.subject,date:new Date().toLocaleDateString('fr-FR'),total,correct,pct,quizType:S.quizType,quiz:S.quiz,corrections:S.corrections,confidence:conf?.score};
  S.history.push(entry);DB.set('history',S.history);
  S.page='results';render();
}

  const it=S.history.find(h=>h.id===id);if(!it)return;
  S.quiz=it.quiz;S.corrections=it.corrections;S.score={correct:it.correct,total:it.total,pct:it.pct};S.advice='(Résultat historique)';S.page='results';render();

// ── IMAGES WIKIMEDIA ─────────────────────────────────
const _imgCache={};
async function fetchWikimediaImage(query){
  if(_imgCache[query]!==undefined)return _imgCache[query];
  try{
    const url=`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`;
    const r=await fetch(url,{signal:AbortSignal.timeout(3000)});
    if(!r.ok){_imgCache[query]=null;return null;}
    const d=await r.json();
    const img=d.thumbnail?.source||d.originalimage?.source||null;
    _imgCache[query]=img;
    return img;
  }catch{_imgCache[query]=null;return null;}
}

// Chercher une image pertinente pour un concept de question
async function getQuestionImage(question,subject){
  // Extraire les mots-clés les plus significatifs
  const stopwords=new Set(['quelle','quel','quels','quelles','est','sont','était','quand','comment','pourquoi','que','qui','dans','pour','avec','sans','sur','les','des','une','un','le','la','du','au','aux']);
  const words=question.toLowerCase()
    .replace(/[^a-zéèêëàâîïùûüôœç\s]/g,'')
    .split(/\s+/)
    .filter(w=>w.length>4&&!stopwords.has(w));
  
  // Chercher d'abord avec les 2 premiers mots, puis le premier seul
  const queries=[
    words.slice(0,2).join(' '),
    words[0],
    subject.replace(/[📐⚗️🌍🧬📖💰🤔🗣️📚]/g,'').trim(),
  ].filter(Boolean);
  
  for(const q of queries){
    const img=await fetchWikimediaImage(q);
    if(img)return img;
  }
  return null;
}

// Déclencher le préchargement des images pour un quiz entier
async function preloadQuizImages(quiz){
  if(!quiz||!quiz.questions)return;
  const promises=quiz.questions.map(q=>getQuestionImage(q.question,quiz.subject||''));
  await Promise.allSettled(promises);
}
